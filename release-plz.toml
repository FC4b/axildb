# release-plz configuration · https://release-plz.dev/docs/config
#
# How releasing works with this setup:
#   1. On every push to `main`, release-plz opens/updates ONE "release" PR that
#      bumps crate versions and updates CHANGELOGs from your conventional commits.
#   2. When you merge that PR, release-plz publishes the changed crates to
#      crates.io (in dependency order, axil-core first … axildb last), then
#      creates the git tags and GitHub releases.
#
# So you don't tag by hand — merging the release PR is the "tag a new version"
# action. Crates with `publish = false` (axildb-umbrella, axil-tests) are
# skipped automatically.

[workspace]
# GitHub Releases are the product's changelog page, not a per-crate ledger:
# only the flagship `axildb` crate (below) gets a Releases entry per cycle.
# Every crate still publishes to crates.io and still gets its git tag — this
# only keeps the Releases page readable (one entry per release, not ~18).
git_release_enable = false
# Bump intra-workspace dependency requirements when a dependency is released.
dependencies_update = true

[[package]]
name = "axildb"
# The product: the one Releases-page entry per cycle.
git_release_enable = true

[[package]]
name = "axil-ql"
# The QL AST/token enums (Query, TokenKind, AggSpec, AggMetric) are a
# documented-unstable compilation surface — #[non_exhaustive], "feed strings
# to run(), don't match the AST" — so grammar growth is deliberately NOT
# treated as a breaking change. Without this override release-plz's own
# cargo-semver-checks run classifies enum growth as major and stamps a 3.x;
# with it, the bump follows conventional commits (feat → minor). This crate
# is versioned by its *language* surface (query strings in, results out),
# which only grows additively. Mirrors the axil-ql exclusion in ci.yml's
# semver gate.
semver_check = false
