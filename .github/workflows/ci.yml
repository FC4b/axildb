name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Anti-coupling guard: the public workspace must build with NO
          # private atlas-server checkout present (it never is on a clone).
          # The only cross-boundary seam is the generic CanonicalPublisher
          # trait in axil-core.
          - label: minimal (core)
            cmd: cargo check -p axildb --no-default-features --features core
          - label: default
            cmd: cargo check --workspace --all-targets
          - label: full
            cmd: cargo check -p axildb --no-default-features --features full
          # axil-sync's HTTP transport is behind a default-off `http` feature
          # (the `--workspace` check above only exercises its default, network-
          # free build); this guards the feature-gated SyncClient.
          - label: axil-sync http
            cmd: cargo check -p axil-sync --features http
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: ${{ matrix.cmd }}

  test:
    name: test (model-free crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Embedding / rerank integration tests download ONNX models at runtime;
      # they run locally and nightly. PR CI covers the model-free storage
      # engines, extensions, and adapters for fast, deterministic signal.
      # axil-vector default features pull in no ONNX/model deps (the HNSW
      # correctness oracle is model-free and deterministic), so it runs here on
      # the per-PR gate alongside the other model-free crates.
      - name: cargo test (storage + graph + fts + timeseries + ql + scip + vector)
        run: >
          cargo test
          -p axil-core
          -p axil-graph
          -p axil-fts
          -p axil-timeseries
          -p axil-ql
          -p axil-scip
          -p axil-vector
      # The CLI's default features pull in ONNX (embed), so its full test run
      # belongs to the nightly/local model job. But its pure-logic tests —
      # the agent hook dialect parsers + golden fixtures, the install wizard,
      # scip detection — are model-free and compile under `core` alone (the
      # `cargo check --features core` job above proves that set builds). Run
      # them here so a dialect field-mapping regression fails the per-PR gate.
      - name: cargo test (axildb model-free — hook dialects, fixtures, wizard)
        run: cargo test -p axildb --no-default-features --features core

  recall-gate:
    name: recall-quality gate (needle retention)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The needle eval runs over FTS with no model and no dataset, so it needs
      # the assembled binary (axil-core alone has no FTS index attached). Build
      # debug for faster CI and point the gate at it; the eval is deterministic
      # regardless of opt level. Fails (exit 3) if any planted needle stops
      # surfacing in top-k or a recalled needle is mangled — i.e. the recall
      # path silently regressed.
      - name: build axil (debug, default features incl. fts)
        run: cargo build -p axildb
      - name: needle-retention recall gate
        run: AXIL_BIN="$PWD/target/debug/axil" scripts/needle-recall-gate.sh

  sqlite-compare-gate:
    name: vector-search speedup gate (sqlite-compare)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Keeps the README "~Nx faster vector search" claim honest: runs the
      # in-tree sqlite-compare harness (Axil HNSW vs SQLite + sqlite-vec, all
      # synthetic — no dataset, no model) at a reduced n and fails if Axil's
      # p50 isn't at least 3x faster than sqlite-vec's. The full 100k/173x run
      # stays a labeled local figure; this gate guards the direction.
      - name: vector-search speedup floor
        run: scripts/sqlite-compare-gate.sh

  embed-smoke:
    name: embed smoke (${{ matrix.os }})
    # The ONLY Windows + macOS coverage in CI. Regression gate for the
    # ONNX-on-Windows break: a from-source `axil` whose `download-binaries`
    # onnxruntime lib is missing/stale fails ORT init at first embed. This
    # builds default features (incl. `embed`), then forces a real
    # `Embedder::new` -> `build_session` via store-with-embed + recall, and
    # fails if the ORT-init error string appears. The prebuilt-archive path
    # (release.yml) bundles the lib so end users never hit this; this job
    # proves the embedder initializes at all on those platforms.
    strategy:
      fail-fast: false
      matrix:
        # macos-15, NOT macos-latest: the latter migrated to macOS 26, and we
        # need an image that still ships an Xcode 16.x to select below.
        os: [windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Skip the build cache on macOS. A restored cache replays stale, absolute
      # link-search paths that ort_sys/rustc baked under a different Xcode (e.g.
      # `-L /Applications/Xcode_26.5.app/.../clang/21/lib/darwin` and a one-shot
      # ort download dir) — both vanish on a fresh runner, so the link dies with
      # "library 'clang_rt.osx' not found" even though the active clang is fine.
      # A clean build re-runs the build scripts under the Xcode selected below.
      - uses: Swatinem/rust-cache@v2
        if: runner.os != 'macOS'
      # GitHub bumped the *default* Xcode on the macOS images to 26.x, whose
      # clang-21 resource-dir layout lacks libclang_rt.osx.a where rustc looks,
      # so the `-lclang_rt.osx` rustc emits dies at link. Force the newest
      # installed pre-26 Xcode via DEVELOPER_DIR (authoritative — overrides any
      # inherited value) for every later step.
      - name: Select a pre-26 Xcode (clang_rt.osx link fix)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app || true
          sel=""
          for app in $(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V); do
            ver=$(basename "$app" | sed -E 's/Xcode_([0-9]+).*/\1/')
            if [ "$ver" -lt 26 ] 2>/dev/null; then sel="$app"; fi
          done
          if [ -n "$sel" ]; then
            echo "Selecting $sel"
            sudo xcode-select -s "$sel/Contents/Developer"
            echo "DEVELOPER_DIR=$sel/Contents/Developer" >> "$GITHUB_ENV"
          else
            echo "::warning::No pre-26 Xcode found; using default $(xcode-select -p)"
          fi
          cc --version || true
      - name: build axil (default features, incl. embed)
        run: cargo build -p axildb
      - name: real embed + recall smoke (fail on ORT init failure)
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/debug/axil"
          if [ -f "$BIN.exe" ]; then BIN="$BIN.exe"; fi
          DB="$RUNNER_TEMP/smoke.axil"
          "$BIN" init "$DB"
          # Store with auto-embed (a >5-char, non-internal table triggers the
          # embedder); capture combined output so we can scan for the failure.
          out=$("$BIN" --db "$DB" store notes '{"summary":"auth timeout bug fixed in the login handler"}' 2>&1)
          echo "$out"
          out2=$("$BIN" --db "$DB" recall "auth timeout" --top-k 5 2>&1)
          echo "$out2"
          if printf '%s\n%s\n' "$out" "$out2" | grep -qi "Failed to initialize ORT API"; then
            echo "::error::ONNX Runtime failed to initialize — the embedder is broken on ${{ matrix.os }}"
            exit 1
          fi

  semver-checks:
    name: semver gate (public API vs crates.io)
    # PR-only. On a PR we compare the branch's public API against the versions
    # currently on crates.io, catching a breaking change that forgot to bump its
    # crate's major. On push-to-main the just-merged (not-yet-released) code can
    # legitimately differ from crates.io — release-plz bumps versions in a
    # separate release PR — so running there would false-alarm.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Reuse the repo's cache pattern: the axildb crate's default features pull
      # in ONNX (ort) at build time, and semver-checks builds rustdoc for every
      # crate, so a warm target/registry cache is what keeps this job affordable.
      - uses: Swatinem/rust-cache@v2
      # No `package` filter: cargo-semver-checks scans the whole workspace and
      # skips any crate it has no crates.io baseline for — both publish=false
      # crates (axil-tests, axildb-umbrella) and any crate not yet released — so
      # a newly added crate never reds this gate before its first publish. All 19
      # currently-published crates have a crates.io baseline, so they are checked.
      # feature-group: default-features mirrors what `cargo add <crate>` gives a
      # downstream (the published default surface) and avoids all-features pulling
      # extra optional code paths beyond the shipped defaults into the check.
      # rust-toolchain: manual reuses the stable toolchain installed above (no
      # second install) so the Swatinem cache above stays keyed to one rustc.
      #
      # Escape hatch for an INTENTIONAL breaking change: bump that crate's major
      # version in the SAME PR. cargo-semver-checks then sees the new major and
      # accepts the break (a major bump is the sanctioned way to ship an
      # incompatible API). With independent versioning only the broken crate needs it.
      - name: cargo-semver-checks (all publishable crates vs crates.io)
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          rust-toolchain: manual
          feature-group: default-features
