name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Anti-coupling guard: the public workspace must build with NO
          # private atlas-server checkout present (it never is on a clone).
          # The only cross-boundary seam is the generic CanonicalPublisher
          # trait in axil-core.
          - label: minimal (core)
            cmd: cargo check -p axildb --no-default-features --features core
          - label: default
            cmd: cargo check --workspace --all-targets
          - label: full
            cmd: cargo check -p axildb --no-default-features --features full
          # axil-sync's HTTP transport is behind a default-off `http` feature
          # (the `--workspace` check above only exercises its default, network-
          # free build); this guards the feature-gated SyncClient.
          - label: axil-sync http
            cmd: cargo check -p axil-sync --features http
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: ${{ matrix.cmd }}

  test:
    name: test (model-free crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Embedding / rerank integration tests download ONNX models at runtime;
      # they run locally and nightly. PR CI covers the model-free storage
      # engines, extensions, and adapters for fast, deterministic signal.
      # axil-vector default features pull in no ONNX/model deps (the HNSW
      # correctness oracle is model-free and deterministic), so it runs here on
      # the per-PR gate alongside the other model-free crates.
      - name: cargo test (storage + graph + fts + timeseries + ql + scip + vector)
        run: >
          cargo test
          -p axil-core
          -p axil-graph
          -p axil-fts
          -p axil-timeseries
          -p axil-ql
          -p axil-scip
          -p axil-vector
      # The CLI's default features pull in ONNX (embed), so its full test run
      # belongs to the nightly/local model job. But its pure-logic tests —
      # the agent hook dialect parsers + golden fixtures, the install wizard,
      # scip detection — are model-free and compile under `core` alone (the
      # `cargo check --features core` job above proves that set builds). Run
      # them here so a dialect field-mapping regression fails the per-PR gate.
      - name: cargo test (axildb model-free — hook dialects, fixtures, wizard)
        run: cargo test -p axildb --no-default-features --features core

  recall-gate:
    name: recall-quality gate (needle retention)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The needle eval runs over FTS with no model and no dataset, so it needs
      # the assembled binary (axil-core alone has no FTS index attached). Build
      # debug for faster CI and point the gate at it; the eval is deterministic
      # regardless of opt level. Fails (exit 3) if any planted needle stops
      # surfacing in top-k or a recalled needle is mangled — i.e. the recall
      # path silently regressed.
      - name: build axil (debug, default features incl. fts)
        run: cargo build -p axildb
      - name: needle-retention recall gate
        run: AXIL_BIN="$PWD/target/debug/axil" scripts/needle-recall-gate.sh

  sqlite-compare-gate:
    name: vector-search speedup gate (sqlite-compare)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Keeps the README "~Nx faster vector search" claim honest: runs the
      # in-tree sqlite-compare harness (Axil HNSW vs SQLite + sqlite-vec, all
      # synthetic — no dataset, no model) at a reduced n and fails if Axil's
      # p50 isn't at least 3x faster than sqlite-vec's. The full 100k/173x run
      # stays a labeled local figure; this gate guards the direction.
      - name: vector-search speedup floor
        run: scripts/sqlite-compare-gate.sh

  embed-smoke:
    name: embed smoke (${{ matrix.os }})
    # The ONLY Windows + macOS coverage in CI. Regression gate for the
    # ONNX-on-Windows break: a from-source `axil` whose `download-binaries`
    # onnxruntime lib is missing/stale fails ORT init at first embed. This
    # builds default features (incl. `embed`), then forces a real
    # `Embedder::new` -> `build_session` via store-with-embed + recall, and
    # fails if the ORT-init error string appears. The prebuilt-archive path
    # (release.yml) bundles the lib so end users never hit this; this job
    # proves the embedder initializes at all on those platforms.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build axil (default features, incl. embed)
        run: cargo build -p axildb
      - name: real embed + recall smoke (fail on ORT init failure)
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/debug/axil"
          if [ -f "$BIN.exe" ]; then BIN="$BIN.exe"; fi
          DB="$RUNNER_TEMP/smoke.axil"
          "$BIN" init "$DB"
          # Store with auto-embed (a >5-char, non-internal table triggers the
          # embedder); capture combined output so we can scan for the failure.
          out=$("$BIN" --db "$DB" store notes '{"summary":"auth timeout bug fixed in the login handler"}' 2>&1)
          echo "$out"
          out2=$("$BIN" --db "$DB" recall "auth timeout" --top-k 5 2>&1)
          echo "$out2"
          if printf '%s\n%s\n' "$out" "$out2" | grep -qi "Failed to initialize ORT API"; then
            echo "::error::ONNX Runtime failed to initialize — the embedder is broken on ${{ matrix.os }}"
            exit 1
          fi
