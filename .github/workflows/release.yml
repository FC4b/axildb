# Prebuilt-binary release workflow — HAND-AUTHORED, the source of truth.
#
# Do NOT run `dist init` / `dist generate` to "refresh" this. cargo-dist's
# generated workflow would be a SECOND file (`axildb-release.yml`) triggering on
# the same `axildb-v*` tag (racing this one), and it CANNOT bundle the
# build-time `onnxruntime.dll` (cargo-dist's `include` is repo-relative; the lib
# lands in `target/<triple>/release/`). The explicit copy step below is the
# load-bearing fix for the Windows ORT-init failure, so this matrix stays
# hand-authored. `dist-workspace.toml` is kept only to back the `dist plan`
# sanity check job.
#
# Scope: this builds the six triples, bundles onnxruntime, and uploads the
# ARCHIVES to the GitHub Release. It does NOT produce one-line `curl|sh`
# installers or an `axil-update` self-updater — the prebuilt distribution is
# `cargo binstall axildb` + these archives. Adding real installers means a full
# cargo-dist adoption, which must first solve ONNX bundling and be validated by
# an actual tagged-release CI run (see dist-workspace.toml header).
#
# Trigger: release-plz emits PER-CRATE tags like `axildb-v1.2.0` (NOT a bare
# `v1.2.0`). This runs AFTER release-plz pushes that tag and UPLOADS assets to
# the Release release-plz already created — the two coexist (release-plz owns
# crate publishing + the Release object; this workflow owns the prebuilt
# archives).
#
# GITHUB_TOKEN gotcha: a tag pushed by release-plz using the default
# GITHUB_TOKEN does NOT trigger this `on: push: tags` workflow — GitHub blocks
# workflow-token pushes from triggering other workflows (loop prevention). So a
# release can land on crates.io with the Release present but ZERO archives.
# Two remedies:
#   1) Recover an affected tag with `workflow_dispatch` below — e.g.
#      `gh workflow run release.yml -f tag=axildb-v2.0.0` — to build + upload its
#      archives without touching the published tag.
#   2) Permanent fix: give release-plz a PAT (repo secret, e.g. RELEASE_PLZ_TOKEN)
#      so its tag push is a *user* push that DOES trigger this workflow.
name: release

on:
  push:
    tags:
      # Per-crate tag for the `axildb` CLI only (binary `axil`). Must match the
      # `tag-namespace = "axildb"` in dist-workspace.toml — a bare `v*` would
      # never recur under release-plz and the job would never fire.
      - "axildb-v*"
  # Manual (re)build of an existing tag's archives — see the GITHUB_TOKEN gotcha
  # above. Builds the tagged code and uploads to that tag's existing Release.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build archives for, e.g. axildb-v2.0.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write # for github-attestations provenance
  attestations: write

env:
  CARGO_TERM_COLOR: always
  # Tag to build/upload: the dispatched input when present, else the pushed tag.
  REL_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  # Enumerate the planned artifacts; a green plan proves the config resolves all
  # six triples (and surfaces a missing prebuilt `ort` artifact early).
  plan:
    name: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REL_TAG }}
      - uses: dtolnay/rust-toolchain@stable
      - name: install cargo-dist
        run: cargo install cargo-dist --version 0.31.0 --locked || cargo install cargo-dist --locked
      - name: dist plan
        run: dist plan --output-format=json

  build:
    name: build (${{ matrix.target }})
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            lib: onnxruntime.dll
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            lib: onnxruntime.dll
          - target: x86_64-apple-darwin
            os: macos-13
            lib: libonnxruntime.dylib
          - target: aarch64-apple-darwin
            os: macos-latest
            lib: libonnxruntime.dylib
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            lib: libonnxruntime.so
          - target: aarch64-unknown-linux-gnu
            # Native ARM runner: cross-linking aarch64-linux on an x86 runner has
            # no cross-linker (the `build axil` step fails), and ort's
            # download-binaries fetches the matching native aarch64 onnxruntime
            # here. Requires GitHub's public-repo ARM runners.
            os: ubuntu-24.04-arm
            lib: libonnxruntime.so
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REL_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      # Build the `axil` binary with default features (includes `embed`, which
      # pulls onnxruntime via ort's `download-binaries`; the lib is cached under
      # the OS cache dir — NOT target/ — so the stage step below locates it).
      - name: build axil
        run: cargo build --release -p axildb --target ${{ matrix.target }}
      # Stage the binary + its sibling onnxruntime lib into the archive root so
      # the loader finds the bundled lib first. This is the load-bearing step
      # that fixes the Windows ORT-init failure on a fresh install.
      - name: stage archive (bundle onnxruntime next to axil)
        shell: bash
        run: |
          set -euo pipefail
          out="target/${{ matrix.target }}/release"
          stage="axildb-${{ matrix.target }}"
          mkdir -p "$stage"
          if [ -f "$out/axil.exe" ]; then cp "$out/axil.exe" "$stage/"; else cp "$out/axil" "$stage/"; fi
          # `ort`'s `download-binaries` does NOT drop the onnxruntime lib in
          # target/ — it caches it under the OS cache dir (~/.cache/ort.pyke.io on
          # Linux, ~/Library/Caches/ort.pyke.io on macOS, %LOCALAPPDATA%\ort.pyke.io
          # on Windows). Search the build output first, then the home tree (which
          # contains every cache root on CI), and bundle the first match next to
          # the binary so the loader resolves the sibling at runtime.
          lib="${{ matrix.lib }}"
          found=""
          for root in "$out" "target/${{ matrix.target }}" "$HOME"; do
            [ -e "$root" ] || continue
            f=$(find "$root" -name "$lib" -type f -print 2>/dev/null | head -n1)
            if [ -n "$f" ]; then found="$f"; break; fi
          done
          if [ -n "$found" ]; then
            cp "$found" "$stage/"
            echo "bundled onnxruntime: $found"
          else
            echo "::error::onnxruntime lib $lib not found in target/ or the ort cache for ${{ matrix.target }} — archive would ship a broken embedder"; exit 1
          fi
      - name: archive
        shell: bash
        run: |
          set -euo pipefail
          stage="axildb-${{ matrix.target }}"
          case "${{ matrix.target }}" in
            *windows*) 7z a "$stage.zip" "$stage" ;;
            *)         tar czf "$stage.tar.gz" "$stage" ;;
          esac
      - name: attest provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "axildb-${{ matrix.target }}.*"
      - name: upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "$REL_TAG" axildb-${{ matrix.target }}.* --clobber
